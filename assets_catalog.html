<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Imagens Extraídas</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: sans-serif;
            padding: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }
        .card {
            background: #222;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid #333;
        }
        .card img {
            max-width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: #333;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .card p {
            font-size: 13px;
            word-break: break-all;
            margin: 0;
            color: #ccc;
        }
        .card span {
            font-size: 11px;
            color: #d8aa68;
        }
    </style>
</head>
<body>
    <h1>Catálogo de Imagens Extraídas (Figma)</h1>
    <p>Abaixo estão todas as imagens extraídas dos arquivos SVG da Unna Vitta:</p>
    <br>
    <div class="grid" id="catalog-grid"></div>

    <script>
        // List of all extracted images from assets dir
        const images = [
            "figma_guilherme_cunha_-_cirurgias_-_desktop_img_0.png",
            "figma_guilherme_cunha_-_cirurgias_-_desktop_img_1.png",
            "figma_guilherme_cunha_-_cirurgias_-_desktop_img_2.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_0.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_1.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_2.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_3.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_4.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_5.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_6.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_7.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_8.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_9.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_10.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_11.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_12.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_13.png",
            "figma_guilherme_cunha_-_home_-_desktop_img_14.png",
            "figma_guilherme_cunha_-_sobre_-_desktop_img_0.png",
            "figma_guilherme_cunha_-_sobre_-_desktop_img_1.png",
            "figma_guilherme_cunha_-_sobre_-_desktop_img_2.png"
        ];

        const grid = document.getElementById('catalog-grid');
        images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const imageEl = document.createElement('img');
            imageEl.src = 'assets/' + img;
            
            const p = document.createElement('p');
            p.textContent = img;
            
            card.appendChild(imageEl);
            card.appendChild(p);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
