<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Comparação de Telas Figma vs Live</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 40px;
        }
        .header {
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tab-btn {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
        }
        .tab-btn.active {
            background: #d8aa68;
            border-color: #ce9035;
            color: #000;
        }
        .preview-pane {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .preview-pane.active {
            display: grid;
        }
        .mobile-pane {
            grid-template-columns: 393px 393px !important;
            justify-content: center;
        }
        .column {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            overflow: hidden;
        }
        .column h3 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
            color: #d8aa68;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: #000;
            border-radius: 4px;
        }
        .figma-img {
            width: 100%;
            height: 800px;
            object-fit: contain;
            background: #000;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Comparação de Telas Figma vs Live</h1>
        <p>Use as abas abaixo para ver a captura de tela do Figma lado a lado com a versão em código funcionando.</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('home')">Home Desktop</button>
        <button class="tab-btn" onclick="switchTab('sobre')">Sobre Desktop</button>
        <button class="tab-btn" onclick="switchTab('cirurgias')">Procedimentos Desktop</button>
        <button class="tab-btn" onclick="switchTab('mobile')">Home Mobile</button>
    </div>

    <!-- Home Desktop Pane -->
    <div id="pane-home" class="preview-pane active">
        <div class="column">
            <h3>Figma Design</h3>
            <img class="figma-img" src="png%20unavitta/Guilherme%20Cunha%20-%20Home%20-%20Desktop.png" alt="Home Desktop Figma">
        </div>
        <div class="column">
            <h3>Live Version</h3>
            <iframe src="index.html"></iframe>
        </div>
    </div>

    <!-- Sobre Desktop Pane -->
    <div id="pane-sobre" class="preview-pane">
        <div class="column">
            <h3>Figma Design</h3>
            <img class="figma-img" src="png%20unavitta/Guilherme%20Cunha%20-%20Sobre%20-%20Desktop.png" alt="Sobre Desktop Figma">
        </div>
        <div class="column">
            <h3>Live Version</h3>
            <iframe src="sobre.html"></iframe>
        </div>
    </div>

    <!-- Cirurgias Desktop Pane -->
    <div id="pane-cirurgias" class="preview-pane">
        <div class="column">
            <h3>Figma Design</h3>
            <img class="figma-img" src="png%20unavitta/Guilherme%20Cunha%20-%20Cirurgias%20-%20Desktop.png" alt="Cirurgias Desktop Figma">
        </div>
        <div class="column">
            <h3>Live Version</h3>
            <iframe src="procedimentos.html"></iframe>
        </div>
    </div>

    <!-- Mobile Pane -->
    <div id="pane-mobile" class="preview-pane mobile-pane">
        <div class="column">
            <h3>Figma Design</h3>
            <img class="figma-img" style="height: 800px; width: 393px; object-fit: contain;" src="png%20unavitta/Guilherme%20Cunha%20-%20Home%20-%20Mobile.png" alt="Home Mobile Figma">
        </div>
        <div class="column">
            <h3>Live Version</h3>
            <iframe style="width: 393px;" src="index.html"></iframe>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            // Deactivate all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Deactivate all panes
            document.querySelectorAll('.preview-pane').forEach(pane => pane.classList.remove('active'));
            
            // Activate current
            event.currentTarget.classList.add('active');
            document.getElementById('pane-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
